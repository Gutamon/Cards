<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>母親節賀卡</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --rose: #C8586A;
            --rose-light: #F2C4CB;
            --rose-pale: #FDF0F2;
            --gold: #C9973A;
            --gold-light: #F5E4C3;
            --cream: #FBF7F0;
            --brown: #5C3D2E;
            --green: #7A9E7E;
            --green-light: #D4E8D4;
        }

        html,
        body {
            height: 100%;
            background: var(--cream);
            font-family: 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
            /* 禁止選取文字 */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* ── SCENE ── */
        .scene {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 1.25rem;
            position: relative;
            overflow: hidden;
        }

        /* Background petals */
        .bg-petal {
            position: fixed;
            border-radius: 50% 0 50% 0;
            opacity: 0.13;
            pointer-events: none;
            z-index: 0;
        }

        .bp1 {
            width: 180px;
            height: 180px;
            background: var(--rose);
            top: -40px;
            right: -40px;
            transform: rotate(20deg);
        }

        .bp2 {
            width: 120px;
            height: 120px;
            background: var(--gold);
            bottom: 10%;
            left: -30px;
            transform: rotate(-30deg);
        }

        .bp3 {
            width: 90px;
            height: 90px;
            background: var(--rose);
            bottom: 30%;
            right: -20px;
            transform: rotate(10deg);
            border-radius: 0 50% 0 50%;
        }

        .bp4 {
            width: 60px;
            height: 60px;
            background: var(--green);
            top: 30%;
            left: 5%;
            transform: rotate(45deg);
            border-radius: 50%;
        }

        /* ── ENVELOPE ── */
        .envelope-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 380px;
            perspective: 1000px;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            padding-top: 40px;
            padding-bottom: 40px;
        }

        .envelope-wrap.up {
            transform: translateY(-60px);
        }

        .envelope {
            position: relative;
            width: 100%;
            aspect-ratio: 1.6 / 1;
            cursor: pointer;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 8px 24px rgba(92, 61, 46, 0.18));
        }

        .envelope:hover {
            transform: scale(1.02);
        }

        .envelope:active {
            transform: scale(0.98);
        }

        .env-body {
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg, #F9EFE2 0%, #F0DFC8 100%);
            border-radius: 8px;
            border: 1.5px solid #DEC9A8;
        }

        /* Flap */
        .env-flap {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 52%;
            transform-origin: top center;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 5;
        }

        .env-flap-front {
            position: absolute;
            inset: 0;
            background: linear-gradient(170deg, #EDD9BB 0%, #E0C8A0 100%);
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            border: 1.5px solid #DEC9A8;
            backface-visibility: hidden;
            z-index: 2;
        }

        .env-flap-inner {
            position: absolute;
            inset: 0;
            background: linear-gradient(170deg, #F9EDE3 0%, #F2DCCB 100%);
            /* 內側的形狀預設為尖端向上，這樣翻轉 180 度後會與外側重合，展開時則正確向上 */
            clip-path: polygon(0 100%, 100% 100%, 50% 0);
            transform: rotateX(180deg);
            transform-origin: center;
            backface-visibility: hidden;
            z-index: 1;
        }

        /* Envelope bottom triangles */
        .env-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 55%;
            background: linear-gradient(0deg, #D6BA94 0%, #E8D0AE 100%);
            clip-path: polygon(0 100%, 50% 0, 100% 100%);
        }

        .env-left {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 52%;
            background: linear-gradient(90deg, #DCBF98 0%, #EDD5B5 100%);
            clip-path: polygon(0 0, 100% 50%, 0 100%);
        }

        .env-right {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 52%;
            background: linear-gradient(-90deg, #DCBF98 0%, #EDD5B5 100%);
            clip-path: polygon(100% 0, 0 50%, 100% 100%);
        }

        /* Wax seal */
        .wax-seal {
            position: absolute;
            bottom: 40%;
            left: 50%;
            transform: translateX(-50%);
            width: 52px;
            height: 52px;
            background: radial-gradient(circle at 40% 35%, #D94F62, #A8293A);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #C93B50;
            box-shadow: 0 2px 8px rgba(168, 41, 58, 0.35);
            z-index: 10;
            transition: transform 0.2s ease;
            font-family: 'Noto Serif TC', serif;
            font-size: 18px;
            color: rgba(255, 230, 230, 0.95);
            letter-spacing: 0.02em;
        }

        .envelope.open {
            transform: translateY(-40px);
        }

        .envelope.open .env-flap {
            transform: rotateX(-180deg);
        }

        .envelope.open .wax-seal {
            transform: translateX(-50%) scale(0.8);
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* Peek hint */
        .peek-hint {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 13px;
            color: #8C6D56;
            letter-spacing: 0.08em;
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        .peek-hint.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* ── CARD ── */
        .card-container {
            width: 100%;
            max-width: 380px;
            margin-bottom: 0;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 1.0s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.6s ease 0.3s,
                margin-bottom 0.5s ease;
            position: relative;
            z-index: 10;
            pointer-events: none;
        }

        .card-container.open {
            max-height: 900px;
            opacity: 1;
            margin-bottom: 0;
            pointer-events: auto;
        }

        .card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #F0DDD5;
            box-shadow: 0 12px 40px rgba(92, 61, 46, 0.12);
        }

        /* Card header illustration */
        .card-header {
            position: relative;
            height: 200px;
            background: linear-gradient(135deg, #FDE8EE 0%, #F9D6E2 40%, #FCE8D5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-header-title {
            position: absolute;
            bottom: 1rem;
            left: 0;
            right: 0;
            text-align: center;
            font-family: 'Noto Serif TC', serif;
            font-size: 26px;
            font-weight: 900;
            color: var(--rose);
            letter-spacing: 0.15em;
            text-shadow: 0 1px 0 rgba(255, 255, 255, 0.8);
            z-index: 2;
        }

        /* Flower SVG decoration */
        .flower-deco {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        /* Card body */
        .card-body {
            padding: 2rem 1.75rem 1.5rem;
        }

        .card-greeting {
            font-family: 'Noto Serif TC', serif;
            font-size: 17px;
            font-weight: 700;
            color: var(--brown);
            line-height: 1.5;
        }

        .card-message {
            font-size: 14px;
            color: #7A5C4A;
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        #markdownContent h1 {
            font-family: 'Noto Serif TC', serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--brown);
            margin-bottom: 1rem;
        }

        #markdownContent p {
            margin-bottom: 0.8rem;
        }

        .card-divider {
            border: none;
            border-top: 1px solid var(--rose-light);
            margin: 0 0 1.5rem;
        }

        .card-signature {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sig-flower {
            width: 36px;
            height: 36px;
            flex-shrink: 0;
        }

        .sig-text {
            font-family: 'Noto Serif TC', serif;
            font-size: 15px;
            color: var(--rose);
            font-weight: 700;
            line-height: 1.5;
        }

        .sig-sub {
            font-size: 12px;
            color: #A07060;
            font-weight: 400;
        }

        /* Floating hearts animation */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 100;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            bottom: -30px;
            font-size: 18px;
            opacity: 0;
            animation: floatUp 2.8s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0.5) rotate(0deg);
                opacity: 0.9;
            }

            50% {
                opacity: 0.7;
            }

            100% {
                transform: translateY(-90vh) scale(1) rotate(20deg);
                opacity: 0;
            }
        }

        /* Close hint */
        .close-hint {
            text-align: center;
            margin: 0.5rem 0 1rem;
            font-size: 12px;
            color: #B08878;
            cursor: pointer;
            letter-spacing: 0.05em;
            opacity: 0;
            transition: opacity 0.5s ease 1s;
            text-decoration: underline;
            text-underline-offset: 3px;
            position: relative;
            z-index: 15;
        }

        .close-hint.show {
            opacity: 1;
        }

        /* Responsive — smaller phones */
        @media (max-width: 360px) {
            .card-body {
                padding: 1.5rem 1.25rem 1.25rem;
            }

            .card-header-title {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>

    <div class="hearts-container" id="hearts"></div>

    <div class="scene">
        <!-- decorative bg petals -->

        <!-- Envelope -->
        <div class="envelope-wrap">
            <!-- Card inside (Move to top) -->
            <div class="card-container" id="cardContainer">

                    <!-- Header with flower illustration -->

                            <line x1="235" y1="160" x2="228" y2="85" stroke="#85AD8A" stroke-width="2" opacity="0.6" />

                                <ellipse cx="0" cy="-18" rx="10" ry="18" fill="#EE8EA0" opacity="0.7"

                                <circle cx="0" cy="0" r="10" fill="#F9D55A" />
                                <circle cx="0" cy="0" r="6" fill="#EDBD3A" />
                            </g>

                            <!-- Flower 2 (center, big) -->
                            <g transform="translate(195,58)">
                                <ellipse cx="0" cy="-20" rx="12" ry="20" fill="#E87D94" opacity="0.82" />
                                <ellipse cx="0" cy="-20" rx="12" ry="20" fill="#F0A0B4" opacity="0.78"
                                    transform="rotate(40)" />
                                <ellipse cx="0" cy="-20" rx="12" ry="20" fill="#E87D94" opacity="0.82"

                                <ellipse cx="0" cy="-20" rx="12" ry="20" fill="#F0A0B4" opacity="0.78"

                                <ellipse cx="0" cy="-20" rx="12" ry="20" fill="#E87D94" opacity="0.82"
                                    transform="rotate(160)" />
                                <ellipse cx="0" cy="-20" rx="12" ry="20" fill="#F0A0B4" opacity="0.78"

                                <ellipse cx="0" cy="-20" rx="12" ry="20" fill="#E87D94" opacity="0.82"

                            <!-- Flower 3 (right) -->
                            <g transform="translate(228,85)">
                                <ellipse cx="0" cy="-16" rx="9" ry="16" fill="#F4B8C8" opacity="0.82" />
                                <ellipse cx="0" cy="-16" rx="9" ry="16" fill="#EDA0B2" opacity="0.75"

                            <!-- Small scattered petals -->

                    </div>

                    <!-- Card body text -->
                    <div class="card-body">
                        <div id="markdownContent" class="card-message">
                            <!-- Markdown will be injected here -->

                        <div class="card-signature">

            <p class="close-hint" id="closeHint" onclick="closeCard()"> ↓ 收回信封</p>

            <!-- Envelope (Move to bottom) -->
            <div class="envelope" id="envelope" onclick="openCard()" role="button" aria-label="點擊開啟母親節賀卡">
                <div class="env-body"></div>
                <div class="env-left"></div>
                <div class="env-right"></div>
                <div class="env-bottom"></div>
                <div class="env-flap">
                    <div class="env-flap-inner"></div>
                    <div class="env-flap-front"></div>
                </div>
                <div class="wax-seal">♡</div>
            </div>

            <p class="peek-hint" id="peekHint">✦ 給親愛的媽 。 輕觸打開 ✦</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        let isOpen = false;

        // Content management
        const config = {
            mom: { file: 'mom.md', hint: '✦ 給親愛的媽 。 輕觸打開 ✦' },
            grandma: { file: 'grandma.md', hint: '✦ 給親愛的外婆 。 輕觸打開 ✦' }
        };

        async function loadContent() {
            const hash = window.location.hash.replace('#', '');
            const settings = config[hash];
            const envWrap = document.querySelector('.envelope-wrap');

            // 單純訪問無效，須有正確的 hash
            if (!settings) {
                envWrap.style.display = 'none';
                const msg = document.createElement('div');
                msg.style.cssText = "position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#C8586A; font-family:'Noto Serif TC',serif; font-size:18px; font-weight:700; letter-spacing:0.1em; z-index:100; text-align:center; line-height:1.8;";
                msg.innerHTML = "這是一份專屬的賀卡<br>請使用正確的連結開啟";
                document.body.appendChild(msg);
                return;
            }

            document.getElementById('peekHint').textContent = settings.hint;

            try {
                const response = await fetch(settings.file);
                if (!response.ok) throw new Error('File not found');
                const text = await response.text();
                document.getElementById('markdownContent').innerHTML = marked.parse(text);
            } catch (err) {
                console.error('Failed to load markdown:', err);
                document.getElementById('markdownContent').innerHTML = '<p>內容載入失敗，請稍後再試。</p>';
            }
        }

        window.addEventListener('DOMContentLoaded', loadContent);

        function openCard() {
            if (isOpen) return;
            isOpen = true;

            const env = document.getElementById('envelope');
            const container = document.getElementById('cardContainer');
            const hint = document.getElementById('peekHint');
            const closeHint = document.getElementById('closeHint');

            const envWrap = document.querySelector('.envelope-wrap');

            env.classList.add('open');
            envWrap.classList.add('up');
            hint.classList.add('hidden');

            setTimeout(() => {
                container.classList.add('open');
            }, 500);

            setTimeout(() => {
                closeHint.classList.add('show');
            }, 1800);

            launchHearts();
        }

        function closeCard() {
            if (!isOpen) return;
            isOpen = false;

            const env = document.getElementById('envelope');
            const container = document.getElementById('cardContainer');
            const hint = document.getElementById('peekHint');
            const closeHint = document.getElementById('closeHint');

            const envWrap = document.querySelector('.envelope-wrap');

            container.classList.remove('open');
            closeHint.classList.remove('show');

            // 等待卡片收納動畫完成 (約 1000ms) 再關閉信封
            setTimeout(() => {
                env.classList.remove('open');
                envWrap.classList.remove('up');
                hint.classList.remove('hidden');
            }, 1000);
        }

        function launchHearts() {
            const container = document.getElementById('hearts');
            const symbols = ['♡', '❀', '✿', '♡', '❁', '♡'];
            const colors = ['#E87D94', '#F4A7B4', '#C9973A', '#D94F62', '#F9D55A', '#A3C4A8'];
            const count = 18;

            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const el = document.createElement('span');
                    el.className = 'heart';
                    el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                    el.style.left = (10 + Math.random() * 80) + '%';
                    el.style.fontSize = (14 + Math.random() * 14) + 'px';
                    el.style.color = colors[Math.floor(Math.random() * colors.length)];
                    el.style.animationDuration = (2 + Math.random() * 1.5) + 's';
                    el.style.animationDelay = (Math.random() * 0.3) + 's';
                    container.appendChild(el);
                    setTimeout(() => el.remove(), 3500);
                }, i * 80);
            }
        }

        // 強制禁用右鍵、複製與剪切
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('copy', e => e.preventDefault());
        document.addEventListener('cut', e => e.preventDefault());
    </script>
</body>
